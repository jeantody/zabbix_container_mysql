version: '3.5'

services:
  zabbixdb:  # Nome deve ser igual ao DB_SERVER_HOST do seu arquivo
    image: mysql:8.0-oracle
    restart: always
    env_file: .env_vars
    volumes:
      - ./zbx_env/var/lib/mysql:/var/lib/mysql:rw
    command:
      - --character-set-server=utf8
      - --collation-server=utf8_bin
      - --default-authentication-plugin=mysql_native_password
    networks:
      zbx_net:

  zabbixserver:  # Nome deve ser igual ao ZBX_SERVER_HOST do seu arquivo
    image: zabbix/zabbix-server-mysql:alpine-7.0-latest
    restart: always
    ports:
      - "10051:10051"
    env_file: .env_vars
    depends_on:
      - zabbixdb
    networks:
      zbx_net:

  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:alpine-7.0-latest
    restart: always
    ports:
      - "80:8080"  # Mantém o mapeamento para a porta interna 8080
    env_file: .env_vars
    depends_on:
      - zabbixdb
      - zabbixserver
    networks:
      zbx_net:

networks:
  zbx_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.233.0/24